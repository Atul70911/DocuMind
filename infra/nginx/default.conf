server {
    listen 80;

    # API requests → Hono backend
    location /api/ {
        proxy_pass http://api:3001/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # ✅ Add these — critical for SSE streaming chat
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;    # long enough for AI responses
    }

    # AI worker requests → FastAPI
    location /ai/ {
        proxy_pass http://ai-worker:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Longer timeout for AI inference
        proxy_read_timeout 120s;
    }

    # Everything else → React frontend
    location / {
        proxy_pass http://web:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /ws {
    proxy_pass http://api:3001/ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 3600s;  # WebSocket connections are long-lived, default timeout would kill them
}
}