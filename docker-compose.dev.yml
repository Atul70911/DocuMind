name: documind

services:

  # ── Backend (hot reload) ─────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    volumes:
      - ./apps/api/src:/app/src          # mount source for hot reload
    environment:
      - NODE_ENV=development
    command: npm run dev                  # tsx watch instead of node dist/

  # ── Frontend (hot reload) ────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    volumes:
      - ./apps/web/src:/app/src
    ports:
      - "5173:5173"                       # expose Vite dev server directly
    command: npm run dev -- --host        # --host makes Vite accessible in container

  # ── AI Worker (hot reload) ───────────────────────────────────
  ai-worker:
    build:
      context: ./apps/ai-worker
      dockerfile: Dockerfile.dev
    volumes:
      - ./apps/ai-worker/app:/app/app    # mount app folder
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Nginx (dev routing) ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    volumes:
    - ./infra/nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
    - "80:80"