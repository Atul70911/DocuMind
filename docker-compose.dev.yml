name: documind

services:

  # ── Backend (hot reload) ─────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    volumes:
      - ./apps/api/src:/app/src
    environment:
      - NODE_ENV=development
    command: npm run dev

  # ── Frontend (hot reload) ────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    volumes:
      - ./apps/web/src:/app/src
    ports:
      - "5173:5173"
    command: npm run dev -- --host

  # ── AI Worker (hot reload) ───────────────────────────────────
  ai-worker:
    build:
      context: ./apps/ai-worker
      dockerfile: Dockerfile.dev
    volumes:
      - ./apps/ai-worker/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Nginx (dev routing) ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    volumes:
      - ./infra/nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"