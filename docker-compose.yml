name: documind

services:

  # ── Frontend ────────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    depends_on:
      - api
    networks:
      - documind-net

  # ── Backend ─────────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/documind
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
      - AI_WORKER_URL=http://ai-worker:8000
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_healthy
    networks:
      - documind-net

  # ── AI Worker ────────────────────────────────────────────────
  ai-worker:
    build:
      context: ./apps/ai-worker
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - OLLAMA_URL=http://ollama:11434
    depends_on:
      - ollama
    networks:
      - documind-net

  # ── MongoDB ──────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - documind-net

  # ── Qdrant ───────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - documind-net

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - documind-net

# ── Ollama ───────────────────────────────────────────────────
  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - documind-net

  # ── Nginx ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api
      - ai-worker
    networks:
      - documind-net
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"   # console UI — useful for dev, remove/restrict in real prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - documind-net
# ── Volumes ──────────────────────────────────────────────────
volumes:
  mongo_data:
  qdrant_data:
  redis_data:
  ollama_data:
  minio_data:

# ── Networks ─────────────────────────────────────────────────
networks:
  documind-net:
    driver: bridge